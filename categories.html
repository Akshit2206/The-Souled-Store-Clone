<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Souled Store Clone - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
        }
        .cat-box {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .cat-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }
        .cat-box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .cat-box:hover img {
            transform: scale(1.08);
        }
        .cat-text-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">The Souled Store Clone</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Browse Collections</h1>
            <p class="text-muted">Find exactly what matches your lifestyle and mood.</p>
        </div>

        <div class="row g-4">
            <div class="col-12 col-sm-6 col-md-4">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1488161628813-04466f872be2?auto=format&fit=crop&w=500&q=80" alt="Men">
                    <div class="cat-text-banner">MEN</div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=500&q=80" alt="Women">
                    <div class="cat-text-banner">WOMEN</div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1562157873-818bc0726f68?auto=format&fit=crop&w=500&q=80" alt="Oversized">
                    <div class="cat-text-banner">OVERSIZED T-SHIRTS</div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=80" alt="Hoodies">
                    <div class="cat-text-banner">HOODIES</div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1578932750294-f5075e85f44a?auto=format&fit=crop&w=500&q=80" alt="Anime">
                    <div class="cat-text-banner">ANIME COLLECTION</div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=500&q=80" alt="Marvel">
                    <div class="cat-text-banner">MARVEL COLLECTION</div>
                </div>
            </div>
            <div class="col-12 justify-content-center col-md-4 mx-auto">
                <div class="cat-box">
                    <img src="https://images.unsplash.com/photo-1509281373149-e957c6296406?auto=format&fit=crop&w=500&q=80" alt="Accessories">
                    <div class="cat-text-banner">ACCESSORIES</div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="products.html" class="btn btn-dark btn-lg px-5">View All Products</a>
        </div>
    </div>

    <footer class="bg-dark text-white py-3 text-center mt-auto">
        <p class="m-0">&copy; 2026 The Souled Store Clone</p>
    </footer>

</body>
</html>
